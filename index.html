<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SheAI – GenZ Chatbot</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', system-ui, sans-serif;
}

body{
  height:100vh;
  background:radial-gradient(circle at top,#1e1b4b,#020617);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* HERO */
.hero{
  text-align:center;
}

.hero h1{
  font-size:3rem;
}

.hero span{
  color:#a855f7;
}

.hero p{
  margin:12px 0 25px;
  color:#c7c7c7;
}

.hero button{
  padding:14px 32px;
  font-size:16px;
  border:none;
  border-radius:40px;
  cursor:pointer;
  background:linear-gradient(135deg,#a855f7,#ec4899);
  color:white;
  box-shadow:0 0 25px rgba(168,85,247,.6);
}

/* MODAL */
.chat-modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.chat-box{
  width:380px;
  height:600px;
  background:#020617;
  border-radius:18px;
  box-shadow:0 0 40px rgba(168,85,247,.4);
  display:flex;
  flex-direction:column;
}

.chat-header{
  padding:14px;
  background:linear-gradient(135deg,#a855f7,#ec4899);
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-radius:18px 18px 0 0;
}

.chat-header span{
  font-weight:600;
}

.chat-header button{
  background:none;
  border:none;
  color:white;
  font-size:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <h1>Hey 👋 I’m <span>SheAI</span></h1>
  <p>Your Gen-Z AI chatbot ✨</p>
  <button onclick="openChat()">Start Chat 💬</button>
</div>

<!-- CHAT MODAL -->
<div class="chat-modal" id="chatModal">
  <div class="chat-box">
    <div class="chat-header">
      <span>SheAI 💜</span>
      <button onclick="closeChat()">✕</button>
    </div>
  </div>
</div>

<!-- BOTPRESS WEBCHAT -->
<script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>

<script>
window.botpressWebChat.init({
  hostUrl: "https://cdn.botpress.cloud/webchat/v3.6",
  botId: "6118e765-dacf-4cc9-a046-4ebaf3f2595e",
  clientId: "6118e765-dacf-4cc9-a046-4ebaf3f2595e",
  hideWidget: true,
  showPoweredBy: false,
  containerWidth: "380px",
  layoutWidth: "380px"
});

function openChat(){
  document.getElementById("chatModal").style.display="flex";
  window.botpressWebChat.show();
}

function closeChat(){
  document.getElementById("chatModal").style.display="none";
  window.botpressWebChat.hide();
}
</script>

</body>
</html>
